name: Build and publish AI Customs ERP V2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.0.1"
        required: false
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - stable

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $inputVersion = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
          } else {
            $inputVersion = ""
            $channel = "stable"
          }

          $settings = Get-Content settings.json -Raw | ConvertFrom-Json
          $baseVersion = if ($inputVersion) { $inputVersion } else { $settings.version }

          if ($channel -eq "beta") {
            $version = "$baseVersion-beta.${{ github.run_number }}"
            $tag = "v$version"
            $prerelease = "true"
            $makeLatest = "false"
          } else {
            $version = "$baseVersion.${{ github.run_number }}"
            if ($inputVersion) { $version = $inputVersion }
            $tag = "v$version"
            $prerelease = "false"
            $makeLatest = "true"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "make_latest=$makeLatest" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Update bundled version files
        shell: pwsh
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $settings = Get-Content settings.json -Raw | ConvertFrom-Json
          $settings.version = $version
          $settings | ConvertTo-Json -Depth 20 | Set-Content settings.json -Encoding UTF8
          $manifest = Get-Content version.json -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest | ConvertTo-Json -Depth 20 | Set-Content version.json -Encoding UTF8

      - name: Create or update tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.vars.outputs.tag }}" "${{ github.sha }}"
          git push origin -f "${{ steps.vars.outputs.tag }}"

      - name: Build onefile EXE
        shell: pwsh
        run: |
          .\build_v2_exe.ps1

      - name: Generate version.json
        run: >
          python scripts/make_release_manifest.py
          --repo "${{ github.repository }}"
          --tag "${{ steps.vars.outputs.tag }}"
          --version "${{ steps.vars.outputs.version }}"
          --exe "dist/default.exe"
          --channel "${{ steps.vars.outputs.channel }}"
          --output "dist/version.json"

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "dist\default.exe").Hash.ToLower()
          Set-Content -Path "dist\SHA256.txt" -Value "$hash  default.exe" -Encoding UTF8

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: AI Customs ERP V2 ${{ steps.vars.outputs.version }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          make_latest: ${{ steps.vars.outputs.make_latest }}
          files: |
            dist/default.exe
            dist/version.json
            dist/SHA256.txt
