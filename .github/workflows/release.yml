name: Release AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "v2/**"
      - "engine/**"
      - "config/**"
      - "scripts/**"
      - "templates/**"
      - "AI_Customs_ERP_V2.spec"
      - "build_v2_exe.ps1"
      - ".github/workflows/release.yml"
      - ".github/workflows/build.yml"
      - ".github/workflows/cleanup_dev_releases.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
          } else {
            $manifest = Get-Content "config\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $version = "$($manifest.version)" -replace "-dev\.\d+$", "-dev"
            $channel = if ($version -match "-dev$") { "dev" } else { "stable" }
          }

          if ($channel -eq "dev") {
            if ($version -notmatch "-dev$") { throw "DEV releases must use a -dev version." }
            $version = $version -replace "-dev\.\d+$", "-dev"
          } else {
            if ($version -match "-dev") { throw "Stable releases cannot use a -dev version." }
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py v2\core\updater.py v2\core\settings.py scripts\make_release_manifest.py scripts\release_contract.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py
          python scripts\test_v2_updater_version_source.py

      - name: Build release package
        shell: pwsh
        run: |
          .\scripts\build_release_package.ps1 `
            -Repo "${{ github.repository }}" `
            -Tag "${{ steps.vars.outputs.tag }}" `
            -Version "${{ steps.vars.outputs.version }}" `
            -Channel "${{ steps.vars.outputs.channel }}" `
            -ReleaseNotes "${{ steps.vars.outputs.channel }} release ${{ steps.vars.outputs.tag }}" `
            -MinimumSupportedVersion "${{ steps.vars.outputs.version }}"

      - name: Generate release assets
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform_Setup.exe"
          $exePath = Join-Path "dist" $assetName

          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Expected setup EXE not found: $exePath"
          }
          python scripts\release_contract.py `
            --mode manifest `
            --repo $repo `
            --tag $tag `
            --channel $channel `
            --manifest "dist\version.json"

          if (Test-Path "config\v2_settings.json") {
            $settings = Get-Content "config\v2_settings.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $settings.update.channel = $channel
            $settings.update.stable_manifest_url = "https://github.com/$repo/releases/latest/download/version.json"
            $settings.update.dev_manifest_url = "https://raw.githubusercontent.com/$repo/main/config/dev_version.json"
            $settings | ConvertTo-Json -Depth 30 | Set-Content "config\v2_settings.json" -Encoding UTF8
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-customs-erp-${{ steps.vars.outputs.channel }}-${{ steps.vars.outputs.version }}
          path: |
            dist/*.exe
            dist/version.json
            dist/SHA256.txt
            dist/config/version.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit manifest updates
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config\version.json config\v2_settings.json config\dev_version.json
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: sync ${{ steps.vars.outputs.channel }} release manifest ${{ steps.vars.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          } else {
            Write-Host "No manifest changes to commit."
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $version = "${{ steps.vars.outputs.version }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $commit = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")
          @"
          # $tag

          - Version: $version
          - Channel: $channel
          - Build time: $buildTime
          - Git commit: $commit
          - Assets: TongYangCustomsPlatform_Setup.exe, version.json, SHA256.txt
          - Release lifecycle: build, manifest generation, SHA256 generation, upload, verify, cleanup
          "@ | Set-Content "dist\release-notes.md" -Encoding UTF8

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform_Setup.exe"
          $exePath = Join-Path "dist" $assetName

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag HEAD
          git push origin -f $tag

          .\scripts\release_manager.ps1 `
            -Repo $repo `
            -Tag $tag `
            -Channel $channel `
            -NotesPath "dist\release-notes.md" `
            -ExePath $exePath `
            -VersionPath "dist\version.json" `
            -ShaPath "dist\SHA256.txt" `
            -AssetName $assetName

      - name: Verify published URLs
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          if ($channel -eq "stable") {
            $manifestUrl = "https://github.com/$repo/releases/latest/download/version.json"
            $exeUrl = "https://github.com/$repo/releases/latest/download/TongYangCustomsPlatform_Setup.exe"
            $shaUrl = "https://github.com/$repo/releases/latest/download/SHA256.txt"
          } else {
            $manifestUrl = "https://raw.githubusercontent.com/$repo/main/config/dev_version.json"
            $exeUrl = "https://github.com/$repo/releases/download/$tag/TongYangCustomsPlatform_Setup.exe"
            $shaUrl = "https://github.com/$repo/releases/download/$tag/SHA256.txt"
          }

          $manifestResponse = Invoke-WebRequest -Method Get -Uri $manifestUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"; "Cache-Control" = "no-cache"} -UseBasicParsing
          if ($manifestResponse.StatusCode -ne 200) { throw "Manifest HTTP status was $($manifestResponse.StatusCode)" }
          $manifestText = if ($manifestResponse.Content -is [byte[]]) {
            [Text.Encoding]::UTF8.GetString($manifestResponse.Content)
          } else {
            [string]$manifestResponse.Content
          }
          $manifest = $manifestText | ConvertFrom-Json
          foreach ($field in @("version", "channel", "exe_url", "release_notes", "minimum_supported_version", "sha256", "build_id", "build_time")) {
            if (-not $manifest.$field) { throw "version manifest missing field: $field" }
          }
          if ($manifest.exe_url -ne $exeUrl) { throw "version manifest exe_url mismatch. manifest=$($manifest.exe_url) expected=$exeUrl" }
          if ($manifest.sha256 -notmatch "^[0-9a-f]{64}$") { throw "version manifest sha256 is invalid: $($manifest.sha256)" }

          $exeResponse = Invoke-WebRequest -Method Head -Uri $exeUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"} -UseBasicParsing
          if ($exeResponse.StatusCode -lt 200 -or $exeResponse.StatusCode -ge 400) {
            throw "EXE HTTP status was $($exeResponse.StatusCode)"
          }
          $shaResponse = Invoke-WebRequest -Method Get -Uri $shaUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"; "Cache-Control" = "no-cache"} -UseBasicParsing
          if ($shaResponse.StatusCode -ne 200) { throw "SHA256.txt HTTP status was $($shaResponse.StatusCode)" }
          $shaText = if ($shaResponse.Content -is [byte[]]) {
            [Text.Encoding]::UTF8.GetString($shaResponse.Content)
          } else {
            [string]$shaResponse.Content
          }
          if ($shaText -notmatch [regex]::Escape($manifest.package_sha256)) { throw "SHA256.txt does not contain installer package_sha256" }
          if ($shaText -notmatch "TongYangCustomsPlatform_Setup\.exe") { throw "SHA256.txt does not reference TongYangCustomsPlatform_Setup.exe" }

          $contractArgs = @(
            "scripts\release_contract.py",
            "--repo", $repo,
            "--tag", $tag,
            "--channel", $channel,
            "--token", $env:GH_TOKEN
          )
          if ($channel -eq "stable") {
            $contractArgs += "--require-latest"
          }
          python @contractArgs
