name: Release AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "v2/**"
      - "engine/**"
      - "config/**"
      - "scripts/**"
      - "templates/**"
      - "AI_Customs_ERP_V2.spec"
      - "build_v2_exe.ps1"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
          } else {
            $manifest = Get-Content "config\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $version = "$($manifest.version)" -replace "-dev\.\d+$", "-dev"
            $channel = if ($version -match "-dev$") { "dev" } else { "stable" }
          }

          if ($channel -eq "dev") {
            if ($version -notmatch "-dev$") { throw "DEV releases must use a -dev version." }
            $version = $version -replace "-dev\.\d+$", "-dev"
          } else {
            if ($version -match "-dev") { throw "Stable releases cannot use a -dev version." }
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py v2\core\updater.py v2\core\settings.py scripts\make_release_manifest.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py
          python scripts\test_v2_updater_version_source.py

      - name: Build EXE
        shell: pwsh
        run: .\build_v2_exe.ps1

      - name: Generate release assets
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $encodedAssetName = [Uri]::EscapeDataString($assetName)
          $exePath = Join-Path "dist" $assetName

          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Expected EXE not found: $exePath"
          }

          python scripts/make_release_manifest.py `
            --repo $repo `
            --tag $tag `
            --version $version `
            --exe $exePath `
            --asset-name $assetName `
            --channel $channel `
            --release-notes "$($channel.ToUpper()) release $tag" `
            --minimum-supported-version $version `
            --output "dist\version.json"

          $manifest = Get-Content "dist\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
          if ($channel -eq "dev") {
            $tagExeUrl = "https://github.com/$repo/releases/download/$tag/$encodedAssetName"
            $manifest.exe_url = $tagExeUrl
            $manifest.download_url = $tagExeUrl
          } else {
            $latestExeUrl = "https://github.com/$repo/releases/latest/download/$encodedAssetName"
            $manifest.exe_url = $latestExeUrl
            $manifest.download_url = $latestExeUrl
          }
          $manifest | ConvertTo-Json -Depth 30 | Set-Content "dist\version.json" -Encoding UTF8

          New-Item -ItemType Directory -Force -Path "dist\config" | Out-Null
          Copy-Item -LiteralPath "dist\version.json" -Destination "dist\config\version.json" -Force
          Copy-Item -LiteralPath "dist\version.json" -Destination "config\version.json" -Force
          if ($channel -eq "dev") {
            Copy-Item -LiteralPath "dist\version.json" -Destination "config\dev_version.json" -Force
          }

          if (Test-Path "config\v2_settings.json") {
            $settings = Get-Content "config\v2_settings.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $settings.update.channel = $channel
            $settings.update.stable_manifest_url = "https://github.com/$repo/releases/latest/download/version.json"
            $settings.update.dev_manifest_url = "https://raw.githubusercontent.com/$repo/main/config/dev_version.json"
            $settings | ConvertTo-Json -Depth 30 | Set-Content "config\v2_settings.json" -Encoding UTF8
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exePath).Hash.ToLower()
          [IO.File]::WriteAllText("dist\SHA256.txt", "$hash  $assetName`n", [Text.UTF8Encoding]::new($false))

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-customs-erp-${{ steps.vars.outputs.channel }}-${{ steps.vars.outputs.version }}
          path: |
            dist/*.exe
            dist/version.json
            dist/SHA256.txt
            dist/config/version.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit manifest updates
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config\version.json config\v2_settings.json config\dev_version.json
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: sync ${{ steps.vars.outputs.channel }} release manifest ${{ steps.vars.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          } else {
            Write-Host "No manifest changes to commit."
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $version = "${{ steps.vars.outputs.version }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $commit = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")
          @"
          # $tag

          - Version: $version
          - Channel: $channel
          - Build time: $buildTime
          - Git commit: $commit
          - Assets: 通洋報關平台.exe, version.json, SHA256.txt
          - Release lifecycle: build, manifest generation, SHA256 generation, upload, verify, cleanup
          "@ | Set-Content "dist\release-notes.md" -Encoding UTF8

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $exePath = Join-Path "dist" $assetName

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag HEAD
          git push origin -f $tag

          .\scripts\release_manager.ps1 `
            -Repo $repo `
            -Tag $tag `
            -Channel $channel `
            -NotesPath "dist\release-notes.md" `
            -ExePath $exePath `
            -VersionPath "dist\version.json" `
            -ShaPath "dist\SHA256.txt" `
            -AssetName $assetName

      - name: Verify published URLs
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          if ($channel -eq "stable") {
            $manifestUrl = "https://github.com/$repo/releases/latest/download/version.json"
            $exeUrl = "https://github.com/$repo/releases/latest/download/$([Uri]::EscapeDataString('通洋報關平台.exe'))"
          } else {
            $manifestUrl = "https://raw.githubusercontent.com/$repo/main/config/dev_version.json"
            $exeUrl = "https://github.com/$repo/releases/download/$tag/$([Uri]::EscapeDataString('通洋報關平台.exe'))"
          }

          $manifestResponse = Invoke-WebRequest -Method Get -Uri $manifestUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"} -UseBasicParsing
          if ($manifestResponse.StatusCode -ne 200) { throw "Manifest HTTP status was $($manifestResponse.StatusCode)" }
          $manifest = $manifestResponse.Content | ConvertFrom-Json
          foreach ($field in @("version", "channel", "exe_url", "release_notes", "minimum_supported_version", "sha256", "build_id", "build_time")) {
            if (-not $manifest.$field) { throw "version manifest missing field: $field" }
          }

          $exeResponse = Invoke-WebRequest -Method Head -Uri $exeUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"} -UseBasicParsing
          if ($exeResponse.StatusCode -lt 200 -or $exeResponse.StatusCode -ge 400) {
            throw "EXE HTTP status was $($exeResponse.StatusCode)"
          }
