name: Build and Release AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
          } else {
            $manifest = Get-Content "config\version.json" -Raw | ConvertFrom-Json
            $base = "$($manifest.version)" -replace "-dev$", ""
            $version = "$base-dev.${{ github.run_number }}"
            $channel = "dev"
          }

          if ($channel -eq "dev") {
            if ($version -notmatch "-dev") {
              throw "DEV releases must use a -dev version."
            }
            $tag = "DEV-$version"
            $prerelease = "true"
            $latest = "false"
          } else {
            if ($version -match "-dev") {
              throw "Stable releases cannot use a -dev version."
            }
            $tag = "v$version"
            $prerelease = "false"
            $latest = "true"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "latest=$latest" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Sync version files
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "通洋報關平台.exe"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$([Uri]::EscapeDataString($assetName))"

          $manifest = Get-Content "config\version.json" -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.channel = $channel
          $manifest.download_url = $downloadUrl
          $manifest.notes = "$($channel.ToUpper()) release $tag"
          $manifest | ConvertTo-Json -Depth 30 | Set-Content "config\version.json" -Encoding UTF8

          if (Test-Path "config\v2_settings.json") {
            $settings = Get-Content "config\v2_settings.json" -Raw | ConvertFrom-Json
            $settings.update.channel = $channel
            $settings | ConvertTo-Json -Depth 30 | Set-Content "config\v2_settings.json" -Encoding UTF8
          }

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py

      - name: Build onefile EXE
        shell: pwsh
        run: .\build_v2_exe.ps1

      - name: Generate assets
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "通洋報關平台.exe"
          $exePath = Join-Path "dist" $assetName

          python scripts/make_release_manifest.py `
            --repo $repo `
            --tag $tag `
            --version $version `
            --exe $exePath `
            --asset-name $assetName `
            --channel $channel `
            --output "dist\version.json"

          New-Item -ItemType Directory -Force -Path "dist\config" | Out-Null
          Copy-Item -LiteralPath "dist\version.json" -Destination "dist\config\version.json" -Force
          Copy-Item -LiteralPath "dist\version.json" -Destination "config\version.json" -Force

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exePath).Hash.ToLower()
          [IO.File]::WriteAllText("dist\SHA256.txt", "$hash  $assetName`n", [Text.UTF8Encoding]::new($false))

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $version = "${{ steps.vars.outputs.version }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $commit = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")
          @"
          # $tag

          - Version: $version
          - Channel: $channel
          - Build time: $buildTime
          - Git commit: $commit
          - Completed modules: workflow UI, async workflow engine binding, release asset generation
          - Parser coverage: semantic-core, booking-so-parser, import DS2/INV/PKG/B/L workflow, export booking/S/O workflow
          - Compare coverage: declaration/document field compare, booking/export field compare, missing document status
          "@ | Set-Content "dist\release-notes.md" -Encoding UTF8

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $latest = "${{ steps.vars.outputs.latest }}"
          $prerelease = "${{ steps.vars.outputs.prerelease }}"
          $title = $tag
          $assets = @(
            "dist\通洋報關平台.exe",
            "dist\SHA256.txt",
            "dist\version.json"
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag "${{ github.sha }}"
          git push origin -f $tag

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
            gh release edit $tag --title $title --notes-file "dist\release-notes.md"
          } else {
            gh release create $tag $assets --title $title --notes-file "dist\release-notes.md"
          }

          if ($prerelease -eq "true") {
            gh release edit $tag --prerelease --latest=false
          } elseif ($latest -eq "true") {
            gh release edit $tag --latest
          }
