name: Release AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
      use_existing_dist:
        description: "Use existing dist assets when present; build only if assets are missing"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
            $useExistingDist = "${{ inputs.use_existing_dist }}"
          } else {
            $manifest = Get-Content "config\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $version = "$($manifest.version)" -replace "-dev\.\d+$", "-dev"
            $channel = "dev"
            $useExistingDist = "true"
          }

          if ($channel -eq "dev") {
            if ($version -notmatch "-dev$") { throw "DEV releases must use a -dev version." }
            $version = $version -replace "-dev\.\d+$", "-dev"
          } else {
            if ($version -match "-dev") { throw "Stable releases cannot use a -dev version." }
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "use_existing_dist=$useExistingDist" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py v2\core\updater.py app\updater.py scripts\make_release_manifest.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py
          python scripts\test_v2_updater_version_source.py

      - name: Sync version files
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform.exe"
          $exeUrl = "https://github.com/$repo/releases/latest/download/$assetName"
          $manifest = Get-Content "config\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
          $manifest.version = $version
          $manifest.channel = $channel
          $manifest.exe_url = $exeUrl
          $manifest.download_url = $exeUrl
          $manifest.release_notes = "$($channel.ToUpper()) release $tag"
          $manifest.notes = $manifest.release_notes
          $manifest.minimum_supported_version = $version
          $manifest | ConvertTo-Json -Depth 30 | Set-Content "config\version.json" -Encoding UTF8

          if (Test-Path "config\v2_settings.json") {
            $settings = Get-Content "config\v2_settings.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $settings.update.channel = $channel
            $settings.update.stable_manifest_url = "https://github.com/$repo/releases/latest/download/version.json"
            $settings.update.stable_download_url = $exeUrl
            $settings | ConvertTo-Json -Depth 30 | Set-Content "config\v2_settings.json" -Encoding UTF8
          }

      - name: Build EXE when needed
        shell: pwsh
        run: |
          $localExeName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $exePath = Join-Path "dist" $localExeName
          $useExistingDist = "${{ steps.vars.outputs.use_existing_dist }}"
          if ($useExistingDist -eq "true" -and (Test-Path -LiteralPath $exePath)) {
            Write-Host "Using existing dist asset: $exePath"
          } else {
            .\build_v2_exe.ps1
          }
          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Expected EXE not found after build step: $exePath"
          }

      - name: Generate release assets
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform.exe"
          $localExeName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $exePath = Join-Path "dist" $localExeName

          python scripts/make_release_manifest.py `
            --repo $repo `
            --tag $tag `
            --version $version `
            --exe $exePath `
            --asset-name $assetName `
            --channel $channel `
            --release-notes "$($channel.ToUpper()) release $tag" `
            --minimum-supported-version $version `
            --output "dist\version.json"

          New-Item -ItemType Directory -Force -Path "dist\config" | Out-Null
          Copy-Item -LiteralPath "dist\version.json" -Destination "dist\config\version.json" -Force
          Copy-Item -LiteralPath "dist\version.json" -Destination "config\version.json" -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exePath).Hash.ToLower()
          [IO.File]::WriteAllText("dist\SHA256.txt", "$hash  $assetName`n", [Text.UTF8Encoding]::new($false))

      - name: Commit manifest updates
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config\version.json config\v2_settings.json
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: sync ${{ steps.vars.outputs.channel }} manifest ${{ steps.vars.outputs.version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          } else {
            Write-Host "No manifest changes to commit."
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $version = "${{ steps.vars.outputs.version }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $commit = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")
          @"
          # $tag

          - Version: $version
          - Channel: $channel
          - Build time: $buildTime
          - Git commit: $commit
          - Completed modules: release manager, updater manifest, workflow engine boundary
          - Parser coverage: semantic-core, booking-so-parser, import DS2/INV/PKG/B/L workflow, export booking/S/O workflow
          - Compare coverage: declaration/document field compare, booking/export field compare, missing document status
          "@ | Set-Content "dist\release-notes.md" -Encoding UTF8

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform.exe"
          $localExeName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $exePath = Join-Path "dist" $localExeName

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag "${{ github.sha }}"
          git push origin -f $tag

          .\scripts\release_manager.ps1 `
            -Repo $repo `
            -Tag $tag `
            -Channel $channel `
            -NotesPath "dist\release-notes.md" `
            -ExePath $exePath `
            -VersionPath "dist\version.json" `
            -ShaPath "dist\SHA256.txt" `
            -AssetName $assetName

