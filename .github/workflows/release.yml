name: Build and Release AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
          } else {
            $manifest = Get-Content "config\version.json" -Raw | ConvertFrom-Json
            $version = "$($manifest.version)" -replace "-dev\.\d+$", "-dev"
            $channel = "dev"
          }

          if ($channel -eq "dev") {
            if ($version -notmatch "-dev") {
              throw "DEV releases must use a -dev version."
            }
            $version = $version -replace "-dev\.\d+$", "-dev"
            $tag = "v$version"
            $latest = "true"
          } else {
            if ($version -match "-dev") {
              throw "Stable releases cannot use a -dev version."
            }
            $tag = "v$version"
            $latest = "true"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "latest=$latest" >> $env:GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Sync version files
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $assetName = "TongYangCustomsPlatform.exe"
          $downloadUrl = "https://github.com/$repo/releases/latest/download/$([Uri]::EscapeDataString($assetName))"

          $manifest = Get-Content "config\version.json" -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.channel = $channel
          $manifest.download_url = $downloadUrl
          $manifest.notes = "$($channel.ToUpper()) release $tag"
          $manifest | ConvertTo-Json -Depth 30 | Set-Content "config\version.json" -Encoding UTF8

          if (Test-Path "config\v2_settings.json") {
            $settings = Get-Content "config\v2_settings.json" -Raw | ConvertFrom-Json
            $settings.update.channel = $channel
            $settings.update.stable_manifest_url = "https://github.com/$repo/releases/latest/download/version.json"
            $settings | ConvertTo-Json -Depth 30 | Set-Content "config\v2_settings.json" -Encoding UTF8
          }

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py

      - name: Build onefile EXE
        shell: pwsh
        run: .\build_v2_exe.ps1

      - name: Generate assets
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ steps.vars.outputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $localExeName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $assetName = "TongYangCustomsPlatform.exe"
          $exePath = Join-Path "dist" $localExeName

          python scripts/make_release_manifest.py `
            --repo $repo `
            --tag $tag `
            --version $version `
            --exe $exePath `
            --asset-name $assetName `
            --channel $channel `
            --output "dist\version.json"

          New-Item -ItemType Directory -Force -Path "dist\config" | Out-Null
          Copy-Item -LiteralPath "dist\version.json" -Destination "dist\config\version.json" -Force
          Copy-Item -LiteralPath "dist\version.json" -Destination "config\version.json" -Force

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exePath).Hash.ToLower()
          [IO.File]::WriteAllText("dist\SHA256.txt", "$hash  $assetName`n", [Text.UTF8Encoding]::new($false))

      - name: Commit manifest updates
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config\version.json config\v2_settings.json
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: sync ${{ steps.vars.outputs.channel }} manifest ${{ steps.vars.outputs.version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          } else {
            Write-Host "No manifest changes to commit."
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $version = "${{ steps.vars.outputs.version }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $commit = git rev-parse --short HEAD
          $buildTime = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")
          @"
          # $tag

          - Version: $version
          - Channel: $channel
          - Build time: $buildTime
          - Git commit: $commit
          - Completed modules: workflow UI, async workflow engine binding, release asset generation
          - Parser coverage: semantic-core, booking-so-parser, import DS2/INV/PKG/B/L workflow, export booking/S/O workflow
          - Compare coverage: declaration/document field compare, booking/export field compare, missing document status
          "@ | Set-Content "dist\release-notes.md" -Encoding UTF8

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $channel = "${{ steps.vars.outputs.channel }}"
          $repo = "${{ github.repository }}"
          $localExeName = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("6YCa5rSL5aCx6Zec5bmz5Y+wLmV4ZQ=="))
          $assetName = "TongYangCustomsPlatform.exe"
          $exePath = Join-Path "dist" $localExeName
          $versionPath = "dist\version.json"
          $shaPath = "dist\SHA256.txt"
          $notesPath = "dist\release-notes.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $tag "${{ github.sha }}"
          git push origin -f $tag

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $repo --title $tag --notes-file $notesPath --latest
          } else {
            gh release create $tag --repo $repo --title $tag --notes-file $notesPath --latest
          }

          .\scripts\upload_release_asset.ps1 `
            -Repo $repo `
            -Tag $tag `
            -Path $exePath `
            -AssetName $assetName `
            -ContentType "application/octet-stream"

          gh release upload $tag $versionPath $shaPath --repo $repo --clobber

          if ($channel -eq "dev") {
            $releases = gh release list --repo $repo --limit 200 --json tagName | ConvertFrom-Json
            foreach ($release in $releases) {
              $name = [string]$release.tagName
              $isDevRelease = $name -match '^DEV-' -or $name -match '^v\d+\.\d+\.\d+-dev(\.\d+)?$'
              if ($isDevRelease -and $name -ne $tag) {
                Write-Host "Deleting old DEV release and tag: $name"
                gh release delete $name --repo $repo --yes --cleanup-tag
                if ($LASTEXITCODE -ne 0) {
                  throw "Failed to delete old DEV release: $name"
                }
              }
            }

            $tagRefs = gh api "repos/$repo/git/matching-refs/tags" --jq '.[].ref'
            foreach ($ref in $tagRefs) {
              $name = $ref -replace '^refs/tags/', ''
              $isDevTag = $name -match '^DEV-' -or $name -match '^v\d+\.\d+\.\d+-dev(\.\d+)?$'
              if ($isDevTag -and $name -ne $tag) {
                Write-Host "Deleting old DEV tag: $name"
                gh api --method DELETE "repos/$repo/git/refs/tags/$name" | Out-Null
                if ($LASTEXITCODE -ne 0) {
                  throw "Failed to delete old DEV tag: $name"
                }
              }
            }
          }

          $release = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
          $assetNames = @($release.assets | ForEach-Object { $_.name })
          foreach ($required in @("TongYangCustomsPlatform.exe", "version.json", "SHA256.txt")) {
            if ($assetNames -notcontains $required) {
              throw "Release $tag is missing required asset: $required. Current assets: $($assetNames -join ', ')"
            }
          }

          $latest = gh api "repos/$repo/releases/latest" | ConvertFrom-Json
          if ($latest.tag_name -ne $tag) {
            throw "/releases/latest points to '$($latest.tag_name)' instead of '$tag'."
          }

          $versionUrl = "https://github.com/$repo/releases/latest/download/version.json"
          $exeUrl = "https://github.com/$repo/releases/latest/download/$assetName"
          $versionResponse = Invoke-WebRequest -Method Head -Uri $versionUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"} -UseBasicParsing
          if ([int]$versionResponse.StatusCode -ne 200) {
            throw "version.json URL returned HTTP $($versionResponse.StatusCode): $versionUrl"
          }
          $exeResponse = Invoke-WebRequest -Method Head -Uri $exeUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"} -UseBasicParsing
          if ([int]$exeResponse.StatusCode -ne 200) {
            throw "EXE URL returned HTTP $($exeResponse.StatusCode): $exeUrl"
          }

          $remoteManifest = Invoke-RestMethod -Uri $versionUrl -Headers @{"User-Agent" = "TongYangReleasePipeline"}
          if ($remoteManifest.download_url -ne $exeUrl) {
            throw "version.json download_url must be '$exeUrl'. Current value: '$($remoteManifest.download_url)'"
          }

          Write-Host "Release verified."
          Write-Host "Latest tag: $tag"
          Write-Host "version.json: $versionUrl"
          Write-Host "EXE: $exeUrl"

