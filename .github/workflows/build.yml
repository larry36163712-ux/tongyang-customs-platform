name: Build AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Build channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile v2\ui\main_window.py v2\core\updater.py scripts\make_release_manifest.py scripts\release_contract.py
          python scripts\test_v2_document_workflow.py
          python scripts\test_v2_declaration_workflow.py
          python scripts\test_v2_updater_version_source.py

      - name: Build EXE
        shell: pwsh
        run: .\build_v2_exe.ps1

      - name: Generate build manifest
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ inputs.version || '1.1.2-dev' }}"
          $channel = "${{ inputs.channel || 'dev' }}"
          $tag = "v$version"
          $assetName = "TongYangCustomsPlatform.exe"
          $exePath = Join-Path "dist" $assetName

          python scripts/make_release_manifest.py `
            --repo $repo `
            --tag $tag `
            --version $version `
            --exe $exePath `
            --asset-name $assetName `
            --channel $channel `
            --release-notes "$($channel.ToUpper()) build $tag" `
            --minimum-supported-version $version `
            --output "dist\version.json"

          if ($channel -eq "dev") {
            $manifest = Get-Content "dist\version.json" -Raw -Encoding UTF8 | ConvertFrom-Json
            $manifest.exe_url = "https://github.com/$repo/releases/download/$tag/$assetName"
            $manifest.download_url = $manifest.exe_url
            $manifest | ConvertTo-Json -Depth 30 | Set-Content "dist\version.json" -Encoding UTF8
          }
          python scripts\release_contract.py `
            --mode manifest `
            --repo $repo `
            --tag $tag `
            --channel $channel `
            --manifest "dist\version.json"

          Copy-Item -LiteralPath "dist\version.json" -Destination "dist\config\version.json" -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exePath).Hash.ToLower()
          [IO.File]::WriteAllText("dist\SHA256.txt", "$hash  $assetName`n", [Text.UTF8Encoding]::new($false))

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-customs-erp-${{ inputs.channel || 'dev' }}-${{ inputs.version || github.sha }}
          path: |
            dist/*.exe
            dist/version.json
            dist/SHA256.txt
            dist/config/version.json
          if-no-files-found: error
          retention-days: 7
