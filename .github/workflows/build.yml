name: Build AI Customs ERP V2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 1.1.3-dev or 1.1.3"
        required: true
        type: string
      channel:
        description: "Build channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m py_compile source\v2\ui\main_window.py source\v2\core\updater.py source\scripts\release_contract.py
          python source\scripts\test_v2_document_workflow.py
          python source\scripts\test_v2_declaration_workflow.py
          python source\scripts\test_v2_updater_version_source.py

      - name: Build release package
        shell: pwsh
        run: |
          $version = "${{ inputs.version || '1.1.2-dev' }}"
          $channel = "${{ inputs.channel || 'dev' }}"
          .\source\scripts\build_release_package.ps1 `
            -Repo "${{ github.repository }}" `
            -Tag "v$version" `
            -Version $version `
            -Channel $channel `
            -ReleaseNotes "$channel build v$version" `
            -MinimumSupportedVersion $version

      - name: Generate build manifest
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ inputs.version || '1.1.2-dev' }}"
          $channel = "${{ inputs.channel || 'dev' }}"
          $tag = "v$version"
          $assetName = "TongYangCustomsPlatform_Setup.exe"
          $exePath = Join-Path "dist" $assetName
          python source\scripts\release_contract.py `
            --mode manifest `
            --repo $repo `
            --tag $tag `
            --channel $channel `
            --manifest "dist\version.json"


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-customs-erp-${{ inputs.channel || 'dev' }}-${{ inputs.version || github.sha }}
          path: |
            dist/*.exe
            dist/version.json
            dist/SHA256.txt
            dist/config/version.json
          if-no-files-found: error
          retention-days: 7
